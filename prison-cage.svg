<!-- prison-cage.svg -->
<svg width="640" height="240" viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dependency Hell</title>
  <desc id="desc">A glowing skull trapped in a cyberpunk Git prison. Welcome to Dependency Hell.</desc>
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#0a1128"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Cloak gradient -->
    <linearGradient id="cloakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- THE NEW SOLID BARS -->
    <g id="single-bar">
      <!-- 1. Blocker (Dark shadow that physically hides the skull behind it) -->
      <line x1="0" y1="28" x2="0" y2="196" stroke="#050914" stroke-width="8" stroke-linecap="round"/>
      <!-- 2. Solid Core -->
      <line x1="0" y1="28" x2="0" y2="196" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <!-- 3. Neon Cyan Glow -->
      <line x1="0" y1="28" x2="0" y2="196" stroke="#00f2fe" stroke-width="6" stroke-linecap="round" filter="url(#neon-cyan)" opacity="0.6"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="640" height="240" fill="url(#bg)"/>
  <rect x="0" y="0" width="640" height="240" fill="url(#grid)"/>
  
  <!-- Spotlight following the skull (approximated with a wide static glow) -->
  <rect x="0" y="0" width="640" height="240" fill="url(#glow)"/>

  <!-- Cage frame -->
  <g id="frame" stroke="#334155" stroke-width="8" fill="none">
    <rect x="28" y="20" width="584" height="180" rx="4" ry="4"/>
    <rect x="24" y="16" width="592" height="188" rx="6" ry="6" stroke="#0f172a" stroke-width="4"/>
  </g>

  <!-- Cyberpunk Skull Entity -->
  <g id="entity_mover">
    <!-- X-axis pacing animation -->
    <animateTransform attributeName="transform" type="translate"
      values="120,0; 350,0; 400,0; 250,0; 120,0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.3; 0.5; 0.8; 1"/>
      
    <!-- Y-axis ghost floating & Skull drawing (FIXED Y-COORDINATES) -->
    <g transform="translate(0, 95)">
      <!-- Ghost hover animation (Fixed math so it stays inside the cage) -->
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,0; 0,-10; 0,5; 0,0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1"/>
        
      <!-- Scale up the skull a bit -->
      <g transform="scale(1.3)">
        <!-- Spectral Cloak -->
        <path d="M-15,-20 C-35,10 -45,45 -25,70 C-15,60 -5,75 0,65 C5,75 15,60 25,70 C45,45 35,10 15,-20 Z" fill="url(#cloakGrad)"/>
        
        <!-- Skull Base -->
        <path d="M0,-55 C-18,-55 -22,-38 -20,-26 C-18,-18 -12,-16 -12,-12 L-10,-2 L10,-2 L12,-12 C12,-16 18,-18 20,-26 C22,-38 18,-55 0,-55 Z" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Cheekbones -->
        <path d="M-12,-12 C-6,-12 -6,-8 0,-8 C6,-8 6,-12 12,-12" fill="none" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Teeth -->
        <line x1="-6" y1="-2" x2="-6" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        <line x1="0" y1="-2" x2="0" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        <line x1="6" y1="-2" x2="6" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Angry Eye Sockets -->
        <path d="M-15,-35 L-3,-31 L-7,-42 Z" fill="#020617"/>
        <path d="M15,-35 L3,-31 L7,-42 Z" fill="#020617"/>
        
        <!-- Nose Cavity -->
        <path d="M0,-23 L-3,-16 L3,-16 Z" fill="#020617"/>
        
        <!-- Glowing Red Pupils -->
        <circle cx="-8" cy="-35" r="1.5" fill="#ff0844" filter="url(#neon-red)">
          <animate attributeName="r" values="1.5; 2.5; 1.5" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="8" cy="-35" r="1.5" fill="#ff0844" filter="url(#neon-red)">
          <animate attributeName="r" values="1.5; 2.5; 1.5" dur="1.5s" repeatCount="indefinite"/>
        </circle>

        <!-- Angry shaking when hitting the walls -->
        <animateTransform attributeName="transform" type="rotate" additive="sum"
          values="0 0 -30; -3 0 -30; 3 0 -30; 0 0 -30" dur="8s" repeatCount="indefinite" 
          keyTimes="0; 0.28; 0.32; 1"/>
      </g>
    </g>
  </g>

  <!-- Glowing Laser Bars (Front Layer) -->
  <g id="bars">
    <!-- Energy field breathing animation -->
    <animate attributeName="opacity" values="0.85; 1; 0.85" dur="3s" repeatCount="indefinite"/>
    
    <use href="#single-bar" x="60" />
    <use href="#single-bar" x="90" />
    <use href="#single-bar" x="120" />
    <use href="#single-bar" x="150" />
    <use href="#single-bar" x="180" />
    <use href="#single-bar" x="210" />
    <use href="#single-bar" x="240" />
    <use href="#single-bar" x="270" />
    <use href="#single-bar" x="300" />
    <use href="#single-bar" x="330" />
    <use href="#single-bar" x="360" />
    <use href="#single-bar" x="390" />
    <use href="#single-bar" x="420" />
    <use href="#single-bar" x="450" />
    <use href="#single-bar" x="480" />
    <use href="#single-bar" x="510" />
    <use href="#single-bar" x="540" />
    <use href="#single-bar" x="570" />
    <use href="#single-bar" x="600" />
  </g>

  <!-- HUD / Dark humor elements -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#38bdf8">
    <!-- Top Sign -->
    <rect x="250" y="30" width="140" height="30" rx="3" fill="#020617" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <text x="320" y="50" text-anchor="middle" font-weight="bold" letter-spacing="1">DEPENDENCY HELL</text>
    
    <!-- Days counter -->
    <rect x="270" y="170" width="100" height="20" rx="2" fill="#020617" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <text x="320" y="184" text-anchor="middle" font-size="10" font-weight="bold">PR #666 STUCK</text>
    
    <!-- Status sign -->
    <rect x="490" y="170" width="120" height="30" rx="2" fill="#020617" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <text x="550" y="183" text-anchor="middle" font-size="10" fill="#f87171">NO APPROVALS</text>
    <text x="550" y="194" text-anchor="middle" font-size="8" fill="#64748b">(forever pending)</text>
  </g>

  <!-- Flashing "MERGE CONFLICT" when hitting bars -->
  <text x="320" y="110" text-anchor="middle" font-family="ui-monospace, monospace" font-size="28" font-weight="900" fill="#ff0844" filter="url(#neon-red)" opacity="0">
    MERGE CONFLICT!
    <animate attributeName="opacity" values="0; 1; 0; 0.8; 0" dur="8s" begin="0s" keyTimes="0; 0.28; 0.3; 0.32; 1" repeatCount="indefinite"/>
  </text>

  <!-- Software Bugs (Replacing the rats) -->
  <g id="software-bugs" fill="#10b981" stroke="#10b981" stroke-width="1.5">
    <!-- Bug 1 -->
    <g>
      <circle cx="0" cy="0" r="2.5" fill="#10b981"/>
      <line x1="-4" y1="-3" x2="4" y2="3"/>
      <line x1="-4" y1="3" x2="4" y2="-3"/>
      <animateTransform attributeName="transform" type="translate" values="40,190; 100,190; 40,190" dur="10s" repeatCount="indefinite"/>
    </g>
    <!-- Bug 2 -->
    <g>
      <circle cx="0" cy="0" r="2.5" fill="#10b981"/>
      <line x1="-4" y1="-3" x2="4" y2="3"/>
      <line x1="-4" y1="3" x2="4" y2="-3"/>
      <animateTransform attributeName="transform" type="translate" values="580,190; 520,190; 580,190" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
