<!-- prison-cage.svg -->
<svg width="640" height="240" viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dependency Hell - Overclocked System</title>
  <desc id="desc">A glowing skull trapped in a cyberpunk Git prison with matrix rain, glitching HUD, electric impacts, sweeping lasers, and CRT scanlines.</desc>
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050914"/>
      <stop offset="100%" stop-color="#0a1128"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Cloak gradient -->
    <linearGradient id="cloakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Scanner Gradient -->
    <linearGradient id="scannerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Patterns -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
    </pattern>

    <!-- Solid Bar Template -->
    <g id="single-bar">
      <line x1="0" y1="28" x2="0" y2="196" stroke="#050914" stroke-width="8" stroke-linecap="round"/>
      <line x1="0" y1="28" x2="0" y2="196" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="28" x2="0" y2="196" stroke="#00f2fe" stroke-width="6" stroke-linecap="round" filter="url(#neon-cyan)" opacity="0.6"/>
    </g>

    <!-- Typing Mask -->
    <clipPath id="typing-mask">
      <rect x="35" y="190" width="0" height="20">
        <animate attributeName="width" values="0; 120; 120; 0" dur="6s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="640" height="240" fill="url(#bg)"/>
  
  <!-- Falling Binary Data (Matrix Vibe) -->
  <g font-family="monospace" font-size="10" fill="#047857" opacity="0.4">
    <g>
      <text x="50" y="-20">10101<tspan x="50" dy="12">01010</tspan><tspan x="50" dy="12">11100</tspan></text>
      <animateTransform attributeName="transform" type="translate" values="0,-50; 0,300" dur="5s" repeatCount="indefinite"/>
    </g>
    <g>
      <text x="180" y="-40">0110<tspan x="180" dy="12">1001</tspan><tspan x="180" dy="12">1100</tspan></text>
      <animateTransform attributeName="transform" type="translate" values="0,-80; 0,300" dur="7s" repeatCount="indefinite"/>
    </g>
    <g>
      <text x="350" y="0">11011<tspan x="350" dy="12">00100</tspan></text>
      <animateTransform attributeName="transform" type="translate" values="0,-20; 0,300" dur="4s" repeatCount="indefinite"/>
    </g>
    <g>
      <text x="490" y="-60">000<tspan x="490" dy="12">111</tspan><tspan x="490" dy="12">010</tspan></text>
      <animateTransform attributeName="transform" type="translate" values="0,-100; 0,300" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <rect x="0" y="0" width="640" height="240" fill="url(#grid)"/>
  <rect x="0" y="0" width="640" height="240" fill="url(#glow)"/>

  <!-- Cage frame -->
  <g id="frame" stroke="#334155" stroke-width="8" fill="none">
    <rect x="28" y="20" width="584" height="180" rx="4" ry="4"/>
    <rect x="24" y="16" width="592" height="188" rx="6" ry="6" stroke="#0f172a" stroke-width="4"/>
  </g>

  <!-- Cyberpunk Skull Entity -->
  <g id="entity_mover">
    <!-- X-axis pacing animation -->
    <animateTransform attributeName="transform" type="translate"
      values="80,0; 540,0; 80,0" dur="8s" repeatCount="indefinite" />
      
    <!-- Y-axis ghost floating & Skull drawing -->
    <g transform="translate(0, 125)">
      <!-- Ghost hover animation -->
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0,0; 0,-10; 0,5; 0,0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1"/>
        
      <g transform="scale(1.3)">
        <!-- Spectral Cloak -->
        <path d="M-15,-20 C-35,10 -45,45 -25,70 C-15,60 -5,75 0,65 C5,75 15,60 25,70 C45,45 35,10 15,-20 Z" fill="url(#cloakGrad)"/>
        
        <!-- Skull Base -->
        <path d="M0,-55 C-18,-55 -22,-38 -20,-26 C-18,-18 -12,-16 -12,-12 L-10,-2 L10,-2 L12,-12 C12,-16 18,-18 20,-26 C22,-38 18,-55 0,-55 Z" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Cheekbones -->
        <path d="M-12,-12 C-6,-12 -6,-8 0,-8 C6,-8 6,-12 12,-12" fill="none" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Teeth -->
        <line x1="-6" y1="-2" x2="-6" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        <line x1="0" y1="-2" x2="0" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        <line x1="6" y1="-2" x2="6" y2="-8" stroke="#64748b" stroke-width="1.5"/>
        
        <!-- Angry Eye Sockets -->
        <path d="M-15,-35 L-3,-31 L-7,-42 Z" fill="#020617"/>
        <path d="M15,-35 L3,-31 L7,-42 Z" fill="#020617"/>
        
        <!-- Nose Cavity -->
        <path d="M0,-23 L-3,-16 L3,-16 Z" fill="#020617"/>
        
        <!-- Glowing Red Pupils -->
        <circle cx="-8" cy="-35" r="1.5" fill="#ff0844" filter="url(#neon-red)">
          <animate attributeName="r" values="1.5; 1.5; 5; 1.5; 1.5" dur="8s" keyTimes="0; 0.48; 0.5; 0.52; 1" repeatCount="indefinite"/>
        </circle>
        <circle cx="8" cy="-35" r="1.5" fill="#ff0844" filter="url(#neon-red)">
          <animate attributeName="r" values="1.5; 1.5; 5; 1.5; 1.5" dur="8s" keyTimes="0; 0.48; 0.5; 0.52; 1" repeatCount="indefinite"/>
        </circle>

        <!-- Shaking on impact -->
        <animateTransform attributeName="transform" type="rotate" additive="sum"
          values="0 0 -30; -5 0 -30; 5 0 -30; 0 0 -30" dur="8s" repeatCount="indefinite" 
          keyTimes="0; 0.48; 0.52; 1"/>
      </g>
    </g>
  </g>

  <!-- Electric Sparks -->
  <g fill="none" stroke="#fef08a" stroke-width="2" filter="url(#neon-yellow)" opacity="0">
    <path d="M540,110 L525,100 L535,90 L515,80" />
    <path d="M540,130 L555,140 L545,150 L565,160" />
    <path d="M540,120 L510,130 L520,140 L490,150" />
    <animate attributeName="opacity" values="0; 0; 1; 0; 0" dur="8s" keyTimes="0; 0.49; 0.5; 0.51; 1" repeatCount="indefinite"/>
  </g>

  <!-- Glowing Laser Bars (Front Layer) -->
  <g id="bars">
    <animate attributeName="opacity" values="0.85; 1; 0.85" dur="3s" repeatCount="indefinite"/>
    <use href="#single-bar" x="60" />
    <use href="#single-bar" x="90" />
    
    <!-- Glitching Bar -->
    <g>
      <use href="#single-bar" x="120" />
      <animate attributeName="opacity" values="1; 0.1; 1; 1; 0.2; 1" dur="4s" keyTimes="0; 0.1; 0.12; 0.8; 0.85; 1" repeatCount="indefinite"/>
    </g>

    <use href="#single-bar" x="150" />
    <use href="#single-bar" x="180" />
    <use href="#single-bar" x="210" />
    <use href="#single-bar" x="240" />
    <use href="#single-bar" x="270" />
    <use href="#single-bar" x="300" />
    <use href="#single-bar" x="330" />
    <use href="#single-bar" x="360" />
    <use href="#single-bar" x="390" />
    <use href="#single-bar" x="420" />
    <use href="#single-bar" x="450" />
    <use href="#single-bar" x="480" />
    <use href="#single-bar" x="510" />
    <use href="#single-bar" x="540" />
    <use href="#single-bar" x="570" />
    <use href="#single-bar" x="600" />
  </g>

  <!-- Security Scanner Laser -->
  <rect x="28" y="0" width="584" height="20" fill="url(#scannerGrad)" opacity="0.6">
    <animate attributeName="y" values="20; 180; 20" dur="5s" repeatCount="indefinite" />
  </rect>

  <!-- Terminal Window (Bottom Left) -->
  <g transform="translate(30, 160)">
    <rect x="0" y="0" width="140" height="40" rx="3" fill="#020617" stroke="#334155" stroke-width="1" opacity="0.85"/>
    <text x="5" y="15" font-family="monospace" font-size="10" fill="#22c55e">root@c2:~#</text>
    
    <!-- Typing command -->
    <text x="5" y="28" font-family="monospace" font-size="10" fill="#e2e8f0" clip-path="url(#typing-mask)">
      rm -rf node_
    </text>
    
    <!-- Flashing Access Denied -->
    <text x="35" y="28" font-family="monospace" font-size="10" fill="#ef4444" opacity="0">
      [DENIED]
      <animate attributeName="opacity" values="0; 0; 1; 0; 1; 0" dur="6s" keyTimes="0; 0.5; 0.55; 0.6; 0.65; 1" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- HUD / Dark humor elements -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#38bdf8">
    <rect x="250" y="30" width="140" height="30" rx="3" fill="#020617" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    
    <!-- Glitching Title Text -->
    <g font-weight="bold" letter-spacing="1">
      <text x="319" y="5
